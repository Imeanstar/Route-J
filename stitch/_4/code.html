<script>
        // Simple interactive effects for chips
        document.querySelectorAll('.cursor-pointer').forEach(el => {
            el.addEventListener('click', function() {
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 150);
            });
        });

        // Search bar interaction
        const searchInput = document.querySelector('input');
        const searchContainer = searchInput.parentElement;
        
        searchInput.addEventListener('focus', () => {
            searchContainer.classList.add('bg-white');
            searchContainer.classList.remove('bg-subtle-gray');
        });

        searchInput.addEventListener('blur', () => {
            searchContainer.classList.remove('bg-white');
            searchContainer.classList.add('bg-subtle-gray');
        });
    </script>
